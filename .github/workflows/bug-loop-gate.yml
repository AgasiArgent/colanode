name: Bug loop - gate
on:
  pull_request:
    types: [labeled]
    branches: [main]
concurrency:
  group: bug-loop-staging
jobs:
  gate:
    if: >-
      vars.AUTOFIX_ENABLED == 'true' &&
      github.event.label.name == 'auto-fix-attempt-1' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'bug-loop/')
    runs-on: [self-hosted, colanode]
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.AUTOFIX_PAT }}
      PR: ${{ github.event.pull_request.number }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.pull_request.head.sha }}", fetch-depth: 0 }
      - name: Wait for PR tests (named check, not self)
        run: |
          for i in $(seq 1 60); do
            S=$(gh pr checks "$PR" --json name,state -q '.[] | select(.name=="Run affected tests") | .state' || echo PENDING)
            case "$S" in
              SUCCESS) exit 0 ;;
              FAILURE|ERROR|CANCELLED) echo "PR tests failed"; exit 1 ;;
              *) sleep 20 ;;
            esac
          done
          echo "timed out waiting for PR tests"; exit 1
      - name: Risk envelope
        run: .github/bug-loop/risk-gate.sh origin/main HEAD
      - name: Boot staging (PR code)
        run: ./scripts/staging-stack.sh up
      - name: Repro manifest must PASS on fixed build
        run: |
          ISSUE=$(gh pr view "$PR" --json title -q .title | grep -oP 'bug-loop#\K[0-9]+')
          sed "s|__BT_BASE_URL__|http://localhost:55080|" "tests/auto-repro/issue-${ISSUE}.yaml" > /tmp/bt-gate.yaml
          node ~/.claude/skills/browser-test-v2/scripts/run-manifest.mjs /tmp/bt-gate.yaml
      - name: Teardown
        if: always()
        run: ./scripts/staging-stack.sh down
      - name: Auto-merge
        run: gh pr merge "$PR" --squash --subject "$(gh pr view "$PR" --json title -q .title)"
      - name: Escalate instead of merging
        if: failure()
        run: |
          gh pr edit "$PR" --add-label needs-human
          .github/bug-loop/notify.sh "PR #$PR did not pass the auto-merge gate — needs human review: $(gh pr view "$PR" --json url -q .url)"
