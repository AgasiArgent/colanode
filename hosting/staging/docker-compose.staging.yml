name: colanode-staging
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: colanode
      POSTGRES_PASSWORD: staging
      POSTGRES_DB: colanode
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U colanode"], interval: 2s, retries: 30 }
  valkey:
    image: valkey/valkey:8.1
    command: valkey-server --requirepass staging
  server:
    image: colanode-server:staging
    environment:
      CONFIG: /app/config.json
      POSTGRES_URL: postgres://colanode:staging@postgres:5432/colanode
      REDIS_URL: redis://:staging@valkey:6379/0
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_started }
  web:
    image: colanode-web:staging
  caddy:
    image: caddy:2-alpine
    ports: ["55080:80"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on: [server, web]
