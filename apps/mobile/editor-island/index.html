<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Colanode Editor</title>
    <style>
      /* `packages/ui`'s globals.css only MAPS --color-background → var(--background);
         it never defines the values — each host app does (see apps/web/index.html).
         The island is its own host, so without these the tokens are empty: the
         WebView stays transparent over the native surface and the text falls back
         to black, unreadable on the dark theme. Keyed on the `dark` class that
         main.tsx sets from the native theme, not prefers-color-scheme. */
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
      }

      :root.dark {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
      }

      html,
      body {
        background-color: var(--background);
        color: var(--foreground);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
